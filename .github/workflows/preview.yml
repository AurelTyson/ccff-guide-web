name: PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: github.event.action != 'closed'
      - run: npm run build
        if: github.event.action != 'closed'
        env:
          # Preview is served from /ccff-guide-web/pr-preview/pr-<N>/
          BASE_PATH: /ccff-guide-web/pr-preview/pr-${{ github.event.number }}/

      # Deploys on open/sync/reopen, removes the preview on close — and
      # comments the preview URL on the PR.
      - name: Deploy / remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          umbrella-dir: pr-preview
          preview-branch: gh-pages
          action: auto
